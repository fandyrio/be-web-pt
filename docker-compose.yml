version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: be_web_pt
    volumes:
      - .:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: web_pt_nginx
    ports:
      - "8083:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: web_pt
    restart: always
    environment:
      MYSQL_DATABASE: web_pt
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
